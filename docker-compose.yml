services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  ranking-service:
    build:
      context: ./ranking-service
      dockerfile: Dockerfile
    environment:
      MODEL_PATH: /models/model.joblib
    volumes:
      - model_data:/models
    ports:
      - "8081:8081"

  train:
    build:
      context: ./ranking-service
      dockerfile: Dockerfile.train
    environment:
      DB_PATH: /data/adengine.db
      MODEL_PATH: /models/model.joblib
    volumes:
      - adserver_data:/data
      - model_data:/models
    profiles:
      - train

  ad-server:
    build:
      context: ./ad-server
      dockerfile: Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
      ranking-service:
        condition: service_started
    environment:
      DB_PATH: /app/data/adengine.db
      KAFKA_BROKERS: kafka:29092
      RANKING_SERVICE_URL: http://ranking-service:8081
    volumes:
      - adserver_data:/app/data
    ports:
      - "8080:8080"

  event-consumer:
    build:
      context: ./event-consumer
      dockerfile: Dockerfile
    depends_on:
      - kafka
      - ad-server
    environment:
      DB_PATH: /app/data/adengine.db
      KAFKA_BROKERS: kafka:29092
    volumes:
      - adserver_data:/app/data

  simulator:
    build:
      context: ./simulator
      dockerfile: Dockerfile
    environment:
      AD_SERVER_URL: http://ad-server:8080
    depends_on:
      - ad-server
    profiles:
      - simulate

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8080
    depends_on:
      - ad-server
    ports:
      - "3000:80"

volumes:
  adserver_data:
  model_data:
